<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flashcard Study App</title>
  <script>
    window.MathJax = {
      tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] },
      svg: { fontCache: 'global' }
    };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js" async></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      margin: 0;
      padding: 1rem;
      font-family: system-ui, sans-serif;
      background: #f5f5f5;
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
      display: flex;
      justify-content: center;
    }
    .container {
      max-width: 480px;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    /* --- 3D flip scene --- */
    .card-scene {
      flex: 1;
      min-height: 0;
      max-height: 560px;
      width: 100%;
      perspective: 800px;
    }
    .card-inner {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.6s ease;
      cursor: pointer;
    }
    .card-inner.flipped {
      transform: rotateY(180deg);
    }
    /* --- shared face styles --- */
    .card-face {
      position: absolute;
      inset: 0;
      border-radius: 16px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.12);
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      overflow: hidden;
    }
    /* --- front face --- */
    .card-front {
      background: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem 1.5rem 1.5rem;
    }
    .card-title {
      position: absolute;
      top: 1rem;
      left: 1rem;
      font-size: 0.8rem;
      font-weight: 600;
      color: #4a6cf7;
      background: rgba(74, 108, 247, 0.08);
      padding: 0.2rem 0.5rem;
      border-radius: 6px;
    }
    .card-prompt {
      font-size: 1.1rem;
      text-align: center;
      color: #222;
      line-height: 1.6;
      margin: 0;
    }
    /* --- back face --- */
    .card-back {
      background: #e8f4fd;
      transform: rotateY(180deg);
      display: flex;
      flex-direction: column;
      padding: 1.25rem 1.25rem 0.75rem;
    }
    .card-answer {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      overflow-x: hidden;
      font-size: 0.95rem;
      color: #1a1a2e;
      line-height: 1.55;
    }
    .card-answer p { margin: 0 0 0.55rem; }
    .card-answer ul, .card-answer ol { padding-left: 1.4rem; margin: 0 0 0.55rem; }
    .card-answer li { margin-bottom: 0.2rem; }
    .card-answer pre {
      overflow-x: auto;
      white-space: pre;
      background: rgba(0,0,0,0.06);
      border-radius: 6px;
      padding: 0.5rem 0.75rem;
      margin: 0 0 0.55rem;
      font-size: 0.85em;
    }
    .card-answer code {
      background: rgba(0,0,0,0.06);
      padding: 0.1em 0.3em;
      border-radius: 4px;
      font-size: 0.88em;
    }
    .card-answer pre code {
      background: none;
      padding: 0;
      font-size: inherit;
    }
    .card-answer table {
      border-collapse: collapse;
      font-size: 0.85em;
      width: 100%;
      margin-bottom: 0.55rem;
    }
    .card-answer th, .card-answer td {
      border: 1px solid rgba(0,0,0,0.15);
      padding: 0.2rem 0.45rem;
      text-align: left;
    }
    .card-answer th { background: rgba(74,108,247,0.1); }
    .card-reference {
      flex-shrink: 0;
      padding-top: 0.4rem;
      margin-top: 0.4rem;
      border-top: 1px solid rgba(0,0,0,0.08);
      text-align: right;
      font-size: 0.72rem;
      color: #6b7a99;
      font-style: italic;
    }
    /* --- controls below card --- */
    .flip-hint {
      text-align: center;
      font-size: 0.78rem;
      color: #888;
      margin: 0;
      flex-shrink: 0;
    }
    .topic-indicator {
      text-align: center;
      font-size: 0.8rem;
      color: #4a6cf7;
      margin: 0;
      font-weight: 600;
      flex-shrink: 0;
    }
    .btn-row {
      display: flex;
      gap: 0.5rem;
      flex-shrink: 0;
    }
    .next-btn {
      background: #4a6cf7;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 0.65rem 0;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      flex: 2;
    }
    .next-btn:hover { background: #3558d6; }
    .home-btn {
      background: #ffffff;
      color: #4a6cf7;
      border: 2px solid #4a6cf7;
      border-radius: 8px;
      padding: 0.65rem 0;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      flex: 1;
      text-align: center;
      text-decoration: none;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .home-btn:hover { background: rgba(74,108,247,0.08); }
  </style>
</head>
<body>
  <div class="container">
    <div class="card-scene">
      <div class="card-inner" id="card-inner" onclick="flipCard()">
        <!-- Front -->
        <div class="card-face card-front">
          <span class="card-title">{{ card.topic }}</span>
          <p class="card-prompt">{{ card.prompt }}</p>
        </div>
        <!-- Back -->
        <div class="card-face card-back">
          <div class="card-answer">{{ answer_html }}</div>
          <span class="card-reference">{{ card.reference }}</span>
        </div>
      </div>
    </div>
    <p class="flip-hint">Tap the card to reveal the answer</p>
    <p class="topic-indicator">Topic: {{ card.topic }}</p>
    <div class="btn-row">
      <a href="/" class="home-btn">Home</a>
      <form action="/next" method="post" style="flex:2;display:flex;">
        <input type="hidden" name="card_id" value="{{ card.topic }}::{{ card.title }}">
        <button type="submit" class="next-btn">Next Card</button>
      </form>
    </div>
  </div>

  <script>
    function flipCard() {
      const inner = document.getElementById('card-inner');
      inner.classList.toggle('flipped');
      if (inner.classList.contains('flipped')) {
        // Wait for flip animation to complete before measuring
        setTimeout(fitAnswerText, 650);
      }
    }

    function fitAnswerText() {
      const answer = document.querySelector('.card-answer');
      // Reset to stylesheet base size and hide overflow while measuring
      answer.style.fontSize = '';
      answer.style.overflowY = 'hidden';
      let size = parseFloat(getComputedStyle(answer).fontSize);
      // Shrink in 0.5px steps until content fits, minimum 7px
      while (answer.scrollHeight > answer.clientHeight + 1 && size > 7) {
        size -= 0.5;
        answer.style.fontSize = size + 'px';
      }
      // If still overflowing at minimum size, re-enable vertical scroll
      if (answer.scrollHeight > answer.clientHeight + 1) {
        answer.style.overflowY = 'auto';
      }
    }
  </script>
</body>
</html>
