- topic: Stacking
  title: Blending vs Stacking implementation difference
  prompt: What is the key implementation difference between Blending and full Stacking?
  answer: "**Blending** (simple, one split):\n\n```python\n# Split once: train vs\
    \ validation\nX_train, X_val = X[:-500], X[-500:]\n\n# Train base models on train\n\
    model_linreg.fit(X_train, y_train)\n\n# Get predictions on validation\npreds =\
    \ model_linreg.predict(X_val)\n\n# Train meta-learner on validation predictions\n\
    meta_learner.fit(stacked_preds, y_val)\n```\n\n**Stacking** (K-fold):\n\n```python\n\
    # K-fold splits, collect out-of-fold predictions\nfor train_idx, val_idx in kf.split(X):\n\
    \    # Train and predict for each fold\n    oof_predictions[val_idx] = model.predict(X[val_idx])\n\
    \n# Train meta-learner on full OOF predictions\nmeta_learner.fit(oof_predictions,\
    \ y)\n```\n\nBlending: faster, one split. Stacking: better, uses all data.\n"
  reference: practicals/stacking-practical-solution.ipynb
- topic: Fundamentals
  title: Stacked predictions array construction
  prompt: How do you construct the stacked predictions array for meta-learner training?
  answer: "```python\n# Get predictions from each base model\npred_linreg = model_linreg.predict(X_val)\n\
    pred_svr = model_svr.predict(X_val)\npred_dtr = model_dtr.predict(X_val)\n\n#\
    \ Stack into single array (transpose to get correct shape)\nstacked_output = np.array([\n\
    \    pred_linreg,\n    pred_svr, \n    pred_dtr\n]).T\n\n# Shape: (n_samples,\
    \ n_models)\n# Each row = all model predictions for one sample\n```\n\nThe meta-learner\
    \ sees each base model's prediction as a feature:\n\n```python\nmeta_learner.fit(stacked_output,\
    \ y_val)\n```\n"
  reference: practicals/stacking-practical-solution.ipynb
- topic: Stacking
  title: Blending prediction function with lambda
  prompt: How do you create a reusable blending prediction function?
  answer: "```python\nblending = lambda x: meta_learner.predict(\n    np.array([\n\
    \        model_linreg.predict(x), \n        model_svr.predict(x),\n        model_dtr.predict(x)\n\
    \    ]).T\n)\n\n# Use it for predictions\npredictions = blending(X_test)\nerror\
    \ = mean_squared_error(y_test, predictions)\n```\n\n**Process**:\n\n1. Pass new\
    \ data through all base models\n2. Stack their predictions\n3. Pass stacked predictions\
    \ through meta-learner\n4. Return final prediction\n\nLambda captures trained\
    \ models in closure for convenient reuse.\n"
  reference: practicals/stacking-practical-solution.ipynb
- topic: Stacking
  title: Blending training function structure
  prompt: What are the key steps in a complete blending training function?
  answer: "```python\ndef train_blending(X_train, y_train, X_val, y_val):\n    # Step\
    \ 1: Train base models on training set\n    model_linreg_ = LinearRegression().fit(X_train,\
    \ y_train)\n    model_svr_ = SVR().fit(X_train, y_train)\n    model_dtr_ = DecisionTreeRegressor().fit(X_train,\
    \ y_train)\n    \n    # Step 2: Stack predictions on validation set\n    stacked_output_\
    \ = np.array([\n        model_linreg_.predict(X_val),\n        model_svr_.predict(X_val),\
    \ \n        model_dtr_.predict(X_val)\n    ]).T\n    \n    # Step 3: Train meta-learner\
    \ on stacked predictions\n    meta_learner_ = LinearRegression().fit(stacked_output_,\
    \ y_val)\n    \n    # Step 4: Return prediction function\n    blending_ = lambda\
    \ x: meta_learner_.predict(...)\n    return blending_\n```\n\nEncapsulates entire\
    \ blending pipeline for reuse.\n"
  reference: practicals/stacking-practical-solution.ipynb
- topic: Stacking
  title: Two-level cross-validation for blending
  prompt: How do you implement proper cross-validation when evaluating a blending
    ensemble?
  answer: "```python\ncv1 = 5\nval_size = 500\n\nsplits = KFold(n_splits=cv1, shuffle=True).split(X)\n\
    \nscores = []\nfor train_index, test_index in splits:\n    X_train, X_test = X[train_index],\
    \ X[test_index]\n    y_train, y_test = y[train_index], y[test_index]\n    \n \
    \   # Train blending on training set (minus validation)\n    model = train_blending(\n\
    \        X_train[:-val_size],  # Train base models\n        y_train[:-val_size],\n\
    \        X_train[-val_size:],  # Train meta-learner\n        y_train[-val_size:]\n\
    \    )\n    \n    # Evaluate on held-out test set\n    scores.append(mean_squared_error(y_test,\
    \ model(X_test)))\n\nprint(np.mean(scores))\n```\n\n**Two levels**: Inner split\
    \ (train/val for blending) + outer CV (evaluation).\n"
  reference: practicals/stacking-practical-solution.ipynb
- topic: Stacking
  title: Out-of-fold predictions in stacking
  prompt: What are out-of-fold (OOF) predictions and why are they used in stacking?
  answer: "**OOF predictions**: Predictions made on validation folds during K-fold\
    \ CV.\n\n```python\noof_predictions = np.zeros((len(X), 3))\n\nfor train_idx,\
    \ val_idx in kf.split(X):\n    # Train on fold\n    m_lin.fit(X[train_idx], y[train_idx])\n\
    \    \n    # Predict on out-of-fold samples\n    oof_predictions[val_idx, 0] =\
    \ m_lin.predict(X[val_idx])\n```\n\n**Purpose**:\n\n- Each sample gets prediction\
    \ from model that didn't see it during training\n- Prevents meta-learner from\
    \ training on overfitted predictions\n- After CV loop, have predictions for entire\
    \ training set\n- Use these to train meta-learner: `meta_learner.fit(oof_predictions,\
    \ y)`\n\nCritical for avoiding overfitting in stacking!\n"
  reference: practicals/stacking-practical-solution.ipynb
