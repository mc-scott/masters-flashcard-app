- topic: Fundamentals
  title: Baseline model importance
  prompt: Why establish baseline single-model performance before using ensembles?
  answer: '**Purpose**: Determine if ensemble actually improved performance.


    **Process**:


    ```python

    # Train single model

    model = DecisionTreeClassifier()

    model.fit(X_train, y_train)

    baseline_score = model.score(X_test, y_test)


    # Train ensemble

    ensemble = BaggingClassifier(estimator=model, n_estimators=10)

    ensemble.fit(X_train, y_train)

    ensemble_score = ensemble.score(X_test, y_test)

    ```


    **Compare**: Does ensemble score > baseline score?


    **Multiple baselines**: Try different model types (Naive Bayes, Decision Tree,
    etc.) to identify best individual model before ensembling.

    '
