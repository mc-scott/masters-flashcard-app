- topic: Stacking
  title: Training error vs test error in blending
  prompt: Why is the initial blending error not a reliable performance estimate?
  answer: '```python

    # After training blending on train/val split

    training_error = mean_squared_error(y, blending(X))

    ```


    **Problem**: This is **training error**, not test error!


    **Reasons it''s unreliable**:


    - Base models saw training portion during training

    - Meta-learner saw validation portion during training

    - Together they''ve "seen" the entire dataset

    - Will be optimistically low (overfitting)


    **Solution**: Use level-2 cross-validation


    - Hold out true test set that neither level saw

    - Training error < test error (realistic estimate)


    Always validate on completely unseen data!

    '
  reference: practicals/stacking-practical-solution.ipynb
