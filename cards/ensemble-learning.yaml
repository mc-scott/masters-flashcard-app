- topic: Random Forest
  title: One-hot encoding for tree models
  prompt: How do you prepare categorical data for tree-based models and why is it
    necessary?
  answer: '**Problem**: Decision trees need numerical splits, categorical strings
    won''t work.


    **Solution**: One-hot encoding


    ```python

    X = pd.get_dummies(X)

    ```


    **Effect**: Each category becomes a binary column


    - `country`: ''US'', ''UK'', ''CA'' → `country_US`, `country_UK`, `country_CA`


    **Important for Random Forests**: Increase `max_features` for one-hot encoded
    data, as multiple columns represent single logical feature.


    Alternative: Some libraries (LightGBM, CatBoost) handle categorical features natively
    without encoding.

    '
