- topic: Stacking
  title: StackingRegressor sklearn setup
  prompt: How do you create and train a StackingRegressor in sklearn?
  answer: "```python\nfrom sklearn.ensemble import StackingRegressor\nfrom sklearn.linear_model\
    \ import LinearRegression\nfrom sklearn.svm import SVR\nfrom sklearn.tree import\
    \ DecisionTreeRegressor\n\nstack_linreg = LinearRegression()\nmodel_stack = StackingRegressor(\n\
    \    [\n        (\"linreg\", LinearRegression()),\n        (\"svc\", SVR()),\n\
    \        (\"dtr\", DecisionTreeRegressor())\n    ],\n    final_estimator=stack_linreg,\n\
    \    cv=6  # Level-2 cross-validation\n)\n\n# Train and evaluate with cross_val_score\n\
    scores = cross_val_score(\n    model_stack, X, y,\n    scoring='neg_mean_squared_error',\n\
    \    cv=5  # Level-1 cross-validation\n)\n```\n\nTwo levels of CV ensure proper\
    \ validation at both ensemble levels.\n"
