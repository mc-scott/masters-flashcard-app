- topic: Random Forest
  title: LightGBM feature importance types
  prompt: What are the two types of feature importance in LightGBM and what do they
    measure?
  answer: '**Split importance**:


    - Counts how many times a feature is used for splitting (excluding leaf nodes)

    - Features used often for decisions are likely informative


    **Gain importance**:


    - Sum of information gain scores from using a feature in trees

    - Measures how much the feature improved model performance


    Both normalized by number of trees in ensemble.


    ```python

    lgb.plot_importance(model, importance_type=''split'')

    lgb.plot_importance(model, importance_type=''gain'')

    ```


    Helps identify which data to prioritize gathering in future.

    '
