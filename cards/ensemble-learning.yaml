- topic: Fundamentals
  title: KFold shuffle importance
  prompt: Why is shuffling important when creating KFold splits for ordered data?
  answer: '```python

    cv = KFold(n_splits=5, shuffle=True)

    ```


    **Problem with unshuffled data**: If data is ordered (e.g., all reds first, then
    whites), sequential splits create biased distributions:


    - Fold 1 might be all reds

    - Fold 5 might be all whites

    - Training and test sets have different distributions


    **Solution**: `shuffle=True` randomizes samples before splitting


    - Ensures each fold has representative distribution

    - Training and test sets more similar

    - More reliable cross-validation scores


    Critical for ordered datasets!

    '
