  title: LightGBM overfitting reduction strategies
  prompt: What hyperparameters can reduce overfitting in LightGBM?
  answer: "**Recommended strategies**:\n\n1. **Small `max_bin`**: Fewer histogram\
    \ bins for continuous features\n2. **Small `num_leaves`**: Limits tree complexity\n\
    3. **Increase `min_data_in_leaf`**: Ensures leaves have sufficient samples\n4.\
    \ **Use `min_gain_to_split`**: Regularizes tree growth\n\n**Example tuning**:\n\
    \n```python\nparams = dict(\n    max_bin=[155, 255],\n    num_leaves=[7, 15, 31],\n\
    \    min_data_in_leaf=[15, 20, 25],\n    min_gain_to_split=[0, 0.01, 0.02]\n)\n\
    ```\n\nUse `GridSearchCV` to find optimal combination.\n"
