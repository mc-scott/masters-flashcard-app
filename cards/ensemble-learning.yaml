- topic: Fundamentals
  title: Hyperparameter tuning diminishing returns
  prompt: What pattern often emerges when comparing default vs optimized Random Forest
    hyperparameters?
  answer: '**Common observation**: Fine-tuning gives only modest improvements.


    **Reasons**:


    - Random Forests work well "out of the box"

    - Feature engineering often more impactful than hyperparameter tuning

    - Default parameters (100 trees, unlimited depth) often near-optimal


    **Example scenario**: Kickstarter success prediction


    - Default RF: ~65% accuracy

    - Tuned RF: ~67% accuracy

    - Limited by features, not hyperparameters


    **Lesson**: If tuning doesn''t help much, focus on better features or different
    model families rather than exhaustive hyperparameter search.

    '
