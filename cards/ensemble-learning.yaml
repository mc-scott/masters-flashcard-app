  title: cross_val_score for quick model evaluation
  prompt: How does cross_val_score simplify model evaluation compared to manual loops?
  answer: "**Manual approach**:\n\n```python\nscores = []\nfor train_idx, test_idx\
    \ in cv.split(X):\n    X_train, X_test = X[train_idx], X[test_idx]\n    y_train,\
    \ y_test = y[train_idx], y[test_idx]\n    model.fit(X_train, y_train)\n    error\
    \ = mean_squared_error(model.predict(X_test), y_test)\n    scores.append(error)\n\
    ```\n\n**cross_val_score approach**:\n\n```python\nscores = cross_val_score(\n\
    \    model, X, y,\n    scoring='neg_mean_squared_error',\n    cv=cv\n)\n```\n\n\
    Handles split iteration, training, and scoring automatically. Use `scoring='neg_mean_squared_error'`\
    \ for regression tasks (negative because sklearn minimizes).\n"
