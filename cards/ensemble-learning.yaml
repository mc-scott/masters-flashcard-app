- topic: Fundamentals
  title: Classification report for imbalanced classes
  prompt: Why use classification_report instead of just accuracy for multi-class problems?
  answer: '**Problem with accuracy**: Single score hides per-class performance, especially
    problematic with imbalanced classes.


    ```python

    from sklearn.metrics import classification_report


    y_pred = model.predict(X_test)

    print(classification_report(y_test, y_pred))

    ```


    **Output per class**:


    - **Precision**: Of predicted positives, how many were correct?

    - **Recall**: Of actual positives, how many were found?

    - **F1-score**: Harmonic mean of precision and recall

    - **Support**: Number of true instances per class


    Reveals if model is failing on specific classes (e.g., rare outcomes).

    '
  reference: practicals/random-forest-practical-solution.ipynb
