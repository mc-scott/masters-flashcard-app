- topic: Pandas
  title: Differences between `pivot()` and `pivot_table()`
  prompt: When should you use `pivot()` versus `pivot_table()`?
  answer: '| Feature | `pivot()` | `pivot_table()` |

    |---|---|---|

    | Data types | Numerical and categorical | Numerical only |

    | Duplicate rows | Fails (requires unique index/column combos) | Handles duplicates
    via `aggfunc` |

    | Aggregation | Not supported | Supported (e.g. `aggfunc=''sum''`) |


    Use `pivot()` for simple reshaping with unique row/column combinations. Use `pivot_table()`
    when duplicate rows exist or aggregation is needed.

    '
  reference: notebooks/pandas/further-pandas-interactive.ipynb
- topic: Pandas
  title: Converting wide-format data to long-format with `melt()`
  prompt: How do you reverse a pivot and convert a DataFrame from wide to long format?
  answer: "```python\nlong_df = pd.melt(\n    df,\n    id_vars='Country',\n    var_name='Metric',\n\
    \    value_name='Measurement'\n)\n```\n`melt()` \"unpivots\" a DataFrame: `id_vars`\
    \ columns are kept as-is, and the remaining columns are stacked into rows. Column\
    \ names become values in `var_name`; original cell values go into `value_name`.\n"
