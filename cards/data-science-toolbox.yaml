Data Science Toolbox:
- topic: Pandas
  title: Reshaping a DataFrame with `.pivot()`
  prompt: What does `.pivot()` do, and what arguments does it take?
  answer: '`.pivot()` reshapes a long-format DataFrame into a wide-format table.


    - `index` — the column whose unique values become the row index

    - `columns` — the column whose unique values become the column headers

    - `values` — the column to fill the cells with


    ```python

    pivot = life_expectancy.pivot(index=''Entity'', columns=''Year'', values=''Life
    expectancy'')

    ```

    '
  reference: notebooks/assignments/human_development_index.ipynb
- topic: Pandas
  title: Checking NaN presence per column with `.isnull().any()`
  prompt: How do you check whether any values in each column of a DataFrame are NaN,
    and count how many columns have (or don't have) NaNs?
  answer: 'Chain `.isnull().any()` to get a boolean Series (one value per column),
    then `.value_counts()` to count `True`/`False`:


    ```python

    num_nans = pivot.isnull().any().value_counts()

    ```


    To check a single column:


    ```python

    nan_in_2019 = pivot[2019].isnull().any()

    ```

    '
  reference: notebooks/assignments/human_development_index.ipynb
- topic: Pandas
  title: Grouping and aggregating with `.groupby()`
  prompt: How do you compute the mean of a column for each unique value of another
    column?
  answer: 'Select the relevant columns, call `.groupby()` on the grouping column,
    then aggregate:


    ```python

    year_vs_life_exp = life_expectancy[[''Year'', ''Life expectancy'']].groupby(''Year'').mean()

    ```

    '
  reference: notebooks/assignments/human_development_index.ipynb
- topic: Pandas
  title: Converting wide format back to long with `.melt()`
  prompt: How do you unpivot (melt) a wide-format DataFrame back into long format?
  answer: 'Use `.reset_index()` to make the index a column, then `.melt()` with `id_vars`
    specifying which column(s) to keep fixed:


    ```python

    melted_pivot = pivot.reset_index().melt(id_vars=''Entity'', value_name=''Life
    expectancy'')

    ```

    '
