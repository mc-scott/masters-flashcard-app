- topic: Numpy
  title: What is a NumPy array?
  prompt: What are the key properties that distinguish a NumPy array from a Python
    list?
  answer: 'A NumPy **ndarray** (n-dimensional array) differs from a Python list in
    three key ways:


    - **Homogeneous** — every element must be the same data type

    - **Indexable** — each element has a numeric index corresponding to its location
    in memory

    - **Mutable** — values can be modified in place (use `.setflags(write=False)`
    to make immutable)


    NumPy makes mathematical operations on arrays **fast** and **memory-efficient**,
    and underpins libraries such as pandas.

    '
  reference: notebooks/numpy/numpy-lesson.ipynb
- topic: Numpy
  title: NumPy array shape, size, and ndim
  prompt: What do the `.shape`, `.size`, and `.ndim` attributes of a NumPy array represent?
  answer: '| Attribute | Meaning |

    |---|---|

    | `.shape` | Tuple of element counts along each dimension, e.g. `(2, 3)` |

    | `.size` | Total number of elements (product of all shape values) |

    | `.ndim` | Number of dimensions (axes) |


    ```python

    b = np.array([[0, 1, 2], [3, 4, 5]])

    b.shape  # (2, 3)

    b.size   # 6

    b.ndim   # 2

    ```


    In NumPy, a vector of 3 elements has `ndim=1` and `shape=(3,)` — not `ndim=3`.

    '
  reference: notebooks/numpy/numpy-lesson.ipynb
- topic: Numpy
  title: Reshaping a NumPy array
  prompt: How do you change the shape of a NumPy array without changing its data?
  answer: 'Use `.reshape()`, providing the new dimensions as arguments. The total
    number of elements must stay the same:

    ```python

    b = np.array([[1, 2, 3], [4, 5, 6]])  # shape (2, 3)

    b.reshape(6)      # shape (6,)  — 1D flat

    b.reshape(3, 2)   # shape (3, 2)

    ```

    Elements are re-arranged in row-major (C) order by default.

    '
  reference: notebooks/numpy/numpy-lesson.ipynb
- topic: Numpy
  title: Indexing a multi-dimensional NumPy array
  prompt: How do you access individual elements and full rows/columns of a 2D NumPy
    array?
  answer: 'Use comma-separated indices `array[row, col]`. Use `:` to select an entire
    dimension:

    ```python

    b = np.array([[1, 2, 3], [4, 5, 6]])


    b[0, 0]   # 1  — element at row 0, col 0

    b[0, 2]   # 3  — element at row 0, col 2

    b[0, :]   # array([1, 2, 3])  — entire row 0 (same as b[0])

    b[:, 0]   # array([1, 4])     — entire column 0

    ```

    '
  reference: notebooks/numpy/numpy-lesson.ipynb
- topic: Numpy
  title: Boolean (mask) indexing in NumPy
  prompt: How do you select elements from a NumPy array that satisfy a condition?
  answer: 'Apply a boolean comparison to the array to create a mask, then use the
    mask to index:

    ```python

    a = np.array([0, 1, 2, 3, 4, 5])

    mask = a > 3          # array([False, False, False, False, True, True])

    a[a > 3]              # array([4, 5])

    ```

    The mask is a boolean array; NumPy returns only the elements where the mask is
    `True`.

    '
  reference: notebooks/numpy/numpy-lesson.ipynb
- topic: Numpy
  title: Slicing a NumPy array
  prompt: How do you extract a contiguous sub-array (slice) from a NumPy array, including
    with negative indices?
  answer: 'Use `start:stop` (upper bound exclusive) and, optionally, a step:

    ```python

    a = np.array([0, 1, 2, 3, 4, 5])


    a[1:4]    # array([1, 2, 3])

    a[:3]     # array([0, 1, 2])   — from beginning

    a[3:]     # array([3, 4, 5])   — to end

    a[-3:]    # array([3, 4, 5])   — last 3 elements

    a[:-3]    # array([0, 1, 2])   — up to (not including) -3

    a[-1]     # 5                  — last element

    a[::2]    # array([0, 2, 4])   — every other element

    ```

    '
  reference: notebooks/numpy/numpy-lesson.ipynb
- topic: Pandas
  title: Applying NumPy functions over specific axes
  prompt: How do you apply a NumPy aggregation function (e.g. sum) along a specific
    axis of a 2D array?
  answer: 'Pass `axis=` to specify which dimension to reduce:

    ```python

    b = np.array([[1, 2, 3], [4, 5, 6]])


    np.sum(b)         # 21  — sum of all elements

    np.sum(b, axis=0) # array([5, 7, 9])   — sum each column (reduce rows)

    np.sum(b, axis=1) # array([6, 15])     — sum each row (reduce columns)

    ```

    Axis 0 = rows, axis 1 = columns.

    '
  reference: notebooks/numpy/numpy-lesson.ipynb
- topic: Numpy
  title: NumPy broadcasting rules
  prompt: What rules determine whether two NumPy arrays can be broadcast together,
    and what shape results?
  answer: 'NumPy aligns shapes from the **trailing** dimension and checks each pair:


    - Pair is broadcastable if sizes are **equal**, or **one of them is 1** (the size-1
    dimension is stretched).

    - Pairs that are neither equal nor include a 1 **cannot** be broadcast — this
    raises a `ValueError`.


    **Examples:**

    ```python

    a.shape = (2, 3)

    b.shape = (   3)  # trailing dims match → result (2, 3)


    a.shape = (2, 3)

    b.shape = (2, 4)  # 3 ≠ 4, neither is 1 → ValueError

    ```

    A scalar (shape `()`) can always be broadcast with any array.

    '
  reference: notebooks/numpy/numpy-lesson.ipynb
- topic: Numpy
  title: Deterministic array generation in NumPy
  prompt: What NumPy functions create arrays with predictable (non-random) values?
  answer: '| Function | Output |

    |---|---|

    | `np.linspace(lo, hi, N)` | N evenly spaced floats from `lo` to `hi` |

    | `np.arange(upper)` | Integers from 0 up to (not including) `upper` |

    | `np.ones(shape)` | Array of 1s with the given shape |

    | `np.zeros(shape)` | Array of 0s with the given shape |

    | `np.eye(N)` | $N \times N$ identity matrix |


    ```python

    np.linspace(1, 5, 10)  # 10 points between 1 and 5

    np.arange(15)           # [0, 1, ..., 14]

    np.eye(3)               # 3×3 identity

    ```

    '
  reference: notebooks/numpy/numpy-lesson.ipynb
- topic: Numpy
  title: Stacking NumPy arrays with `np.stack`, `np.vstack`, and `np.hstack`
  prompt: How do you combine multiple NumPy arrays along a new or existing axis?
  answer: '- **`np.stack((a, b))`** — joins along a **new** axis (default `axis=0`,
    creating a new leading dimension)

    - **`np.vstack([a, b])`** — stacks **vertically** (row-wise, along axis 0)

    - **`np.hstack([a, b])`** — stacks **horizontally** (column-wise, along axis 1)


    ```python

    d = np.array([1, 5, 3])

    e = np.array([4, 4, 2])


    np.stack((d, e))          # shape (2, 3)  — two rows

    np.stack((d, e), axis=1)  # shape (3, 2)  — two columns

    np.vstack([d, e])         # shape (2, 3)

    np.hstack([d, e])         # shape (6,)

    ```

    '
  reference: notebooks/numpy/numpy-lesson.ipynb
- topic: Numpy
  title: Useful NumPy array methods
  prompt: What array methods can be called directly on a NumPy ndarray (without the
    `np.` prefix)?
  answer: 'Common methods callable directly on an array instance:


    | Method | Description |

    |---|---|

    | `a.mean()` | Mean of all elements (or along an axis) |

    | `a.T` | Transpose of the array |

    | `a.argmax()` | Index of the maximum element |

    | `a.reshape(shape)` | Return array with new shape |

    | `a.setflags(write=False)` | Make the array immutable |


    These are equivalent to `np.mean(a)`, `np.transpose(a)`, etc.

    '
  reference: notebooks/numpy/numpy-lesson.ipynb
- topic: Numpy
  title: NumPy infers array dtype from input
  prompt: How does NumPy decide the data type (`dtype`) of an array created from a
    Python list?
  answer: 'NumPy infers the **most general type** that is compatible with all elements:


    ```python

    np.array([True, False]).dtype        # bool

    np.array([1, 2, 5]).dtype            # int64

    np.array([1, 2, 5, 3.0]).dtype       # float64  (one float promotes all)

    np.array([1, 2, "a"]).dtype          # <U21     (string/object when mixed)

    ```

    You can also specify dtype explicitly: `np.array([1, 2], dtype=float)`.

    '
  reference: notebooks/numpy/numpy-practical1-solution.ipynb
- topic: Numpy
  title: Vector vs row matrix vs column matrix in NumPy
  prompt: How does a 1D NumPy vector differ from a 2D row or column matrix, and how
    do you convert between them?
  answer: '| | Shape |

    |---|---|

    | Vector | `(n,)` |

    | Row matrix | `(1, n)` |

    | Column matrix | `(n, 1)` |


    Broadcasting between a vector and a row/column matrix produces a **2D result**
    due to shape differences. Use `.reshape()` or `.squeeze()` to convert:


    ```python

    vec = np.array([1, 2, 3])           # (3,)

    row = np.array([[1, 2, 3]])          # (1, 3)

    col = np.array([[1], [2], [3]])      # (3, 1)


    col.reshape((3,))   # → (3,) vector

    row.squeeze()       # → (3,) vector

    ```

    '
  reference: notebooks/numpy/numpy-practical1-solution.ipynb
- topic: Numpy
  title: Fancy (list) indexing in NumPy
  prompt: How do you select multiple non-contiguous elements from a NumPy array by
    specifying their indices explicitly?
  answer: 'Pass a **list of indices** inside the square brackets — NumPy returns an
    array of the corresponding elements:

    ```python

    a = np.array([0, 1, 2, 3, 4, 5])

    indices = [0, 1, 4]

    a[indices]   # array([0, 1, 4])

    ```

    This is called **fancy indexing** and works across multiple dimensions too.

    '
  reference: notebooks/numpy/numpy-practical2-solution.ipynb
- topic: Numpy
  title: Slicing with a step in NumPy
  prompt: How do you select every nth element from a NumPy array using slice notation?
  answer: 'Use the `start:stop:step` slice syntax. Omitting `start` or `stop` defaults
    to the array boundaries:

    ```python

    a = np.array([1, 2, 3, 4, 5, 6])


    a[2:6:3]   # every 3rd element in range 2–5 → array([3, 6])

    a[::2]     # every 2nd element from start   → array([1, 3, 5])

    ```

    For a 2D array, apply the step in the correct axis:

    ```python

    b = np.array([[1, 2, 3, 4, 5], [5, 4, 3, 2, 1]])

    b[:, ::2]  # every other column → shape (2, 3)

    ```

    '
  reference: notebooks/numpy/numpy-practical2-solution.ipynb
- topic: Numpy
  title: Modifying array elements in place
  prompt: How do you update elements of a NumPy array using indexing, slicing, and
    broadcasting?
  answer: 'Assign directly to the indexed location — the array is modified in place:

    ```python

    a = np.array([1, 2, 3])


    a[0] = 5             # indexing  → [5, 2, 3]

    a[0:3] = [5, 5, 5]  # slicing   → [5, 5, 5]

    a[0:2] = 2           # broadcast → [2, 2, 5]

    a[:, :] = 1          # all elements set to 1

    ```

    Broadcasting rules apply: a scalar is stretched to fill all indexed positions.

    '
  reference: notebooks/numpy/numpy-practical2-solution.ipynb
- topic: Pandas
  title: Computing the mean over a specific axis with `np.random.randn`
  prompt: How do you generate a 2D array of random numbers and compute the mean across
    one axis?
  answer: 'Use `np.random.randn(rows, cols)` to generate random values from a standard
    normal distribution, then pass `axis=` to `.mean()`:

    ```python

    points = np.random.randn(2, 500)   # shape (2, 500)


    # Mean over the column axis (axis=0): one mean per row → shape (500,)

    points.mean(axis=0)


    # Mean over the row axis (axis=1): one mean per column → shape (2,)

    points.mean(axis=1)

    ```

    '
  reference: notebooks/numpy/numpy-practical3-solution.ipynb
- topic: Numpy
  title: Generating linearly spaced arrays with `np.linspace` vs `np.arange`
  prompt: What is the difference between `np.linspace` and `np.arange` for generating
    sequences of numbers?
  answer: '| | `np.linspace(start, stop, N)` | `np.arange(start, stop)` |

    |---|---|---|

    | Controls | **number of points** | **step size** (default 1) |

    | Endpoint | included | excluded |

    | Output dtype | `float64` | matches input (often `int`) |


    ```python

    np.linspace(1, 10, 10)  # [1., 2., 3., ..., 10.] — 10 floats

    np.arange(1, 11)        # [1, 2, 3, ..., 10]     — 10 ints


    all(np.linspace(1, 10, 10) == np.arange(1, 11))  # True

    ```

    '
  reference: notebooks/numpy/numpy-practical3-solution.ipynb
- topic: Pandas
  title: Applying element-wise mathematical functions in NumPy
  prompt: How do you apply mathematical functions like sine and exponential to every
    element of a NumPy array?
  answer: 'Use NumPy''s vectorised equivalents of standard maths functions — they
    operate element-wise without loops:

    ```python

    x = np.linspace(-1, 3, 100)

    y = np.sin(np.exp(-(x**2)))

    ```

    Key functions include `np.sin`, `np.cos`, `np.exp`, `np.log`, `np.sqrt`. These
    return an array of the same shape as the input.

    '
  reference: notebooks/numpy/numpy-practical3-solution.ipynb
- topic: Pandas
  title: The three types of data processing in pandas
  prompt: What are the three categories of data processing operations typically performed
    on a DataFrame?
  answer: '- **Aggregation**: summarising data, e.g. computing totals, averages, or
    counts

    - **Transformation**: converting or reshaping data, e.g. changing types, binning,
    encoding

    - **Cleaning**: handling missing values, removing duplicates, fixing inconsistencies

    '
  reference: notebooks/pandas/data-processing-interactive.ipynb
- topic: Pandas
  title: Concatenating DataFrames vertically with `pd.concat()`
  prompt: How do you stack multiple DataFrames on top of each other using pandas?
  answer: '```python

    combined = pd.concat([df1, df2])              # keeps original index

    combined = pd.concat([df1, df2], ignore_index=True)  # resets index

    ```

    `pd.concat()` joins DataFrames along an axis (default `axis=0`, vertical). Use
    `ignore_index=True` to avoid duplicate index labels.

    '
  reference: notebooks/pandas/data-processing-interactive.ipynb
- topic: Pandas
  title: The four pandas join types
  prompt: What does each join type return when merging two DataFrames?
  answer: '| Join | Rows returned |

    |---|---|

    | LEFT | All rows from left; matching rows from right |

    | RIGHT | All rows from right; matching rows from left |

    | INNER | Only rows with matching keys in **both** DataFrames |

    | FULL OUTER | All rows from both DataFrames; `NaN` where no match |


    Unmatched rows in the non-primary DataFrame are filled with `NaN`.

    '
  reference: notebooks/pandas/data-processing-interactive.ipynb
- topic: Pandas
  title: Merging DataFrames on differently-named columns with `.merge()`
  prompt: How do you merge two DataFrames when the key columns have different names
    in each DataFrame?
  answer: "```python\ndf_merged = df_left.merge(\n    df_right,\n    how='left',\n\
    \    left_on='drug_name',\n    right_on='product_name',\n    indicator=True\n\
    )\n```\nUse `left_on=` and `right_on=` for differently-named key columns. `indicator=True`\
    \ adds a `_merge` column showing whether each row matched in both, left only,\
    \ or right only.\n"
  reference: notebooks/pandas/data-processing-interactive.ipynb
- topic: Pandas
  title: Merging DataFrames using their index as the join key
  prompt: How do you perform a merge where one or both DataFrames use their index
    instead of a named column?
  answer: '```python

    # Set a column as index when reading CSV

    df = pd.read_csv(''data.csv'', index_col=''id'')


    # Merge using index from both DataFrames

    df_merged = df_left.merge(df_right, left_index=True, right_index=True)


    # Mix index from right with column from left

    df_merged = df_left.merge(df_right, left_on=''id'', right_index=True)

    ```

    `left_index=True` or `right_index=True` tells `.merge()` to use the DataFrame''s
    index as the join key instead of a named column.

    '
  reference: notebooks/pandas/data-processing-interactive.ipynb
- topic: Pandas
  title: Replacing NaN and sentinel zero values in a DataFrame
  prompt: How do you fill NaN values in a column, and how do you replace zeros that
    actually represent missing data?
  answer: '```python

    # Fill NaN with a specific value

    df[''col''].fillna(0, inplace=True)


    # Replace zeros with NaN (when 0 means "missing")

    df[''col''] = df[''col''].replace(0, np.nan)

    ```

    `.fillna()` replaces `NaN` with a given value. `.replace(old, new)` replaces specific
    values — useful when a placeholder like `0` actually indicates missing data.

    '
  reference: notebooks/pandas/data-processing-interactive.ipynb
- topic: Pandas
  title: Using `.groupby()` with `.agg()` for multiple named aggregations
  prompt: How do you use `.groupby()` and `.agg()` together to compute multiple statistics
    and control the result column names?
  answer: "```python\nmanu_agg = df.groupby(\"Manufacturer Name\").agg(\n    entries=(\"\
    Manufacturer Name\", \"size\"),\n    patient_estimates=(\"Estimated Number of\
    \ Patients\", \"count\"),\n)\n```\nEach argument to `.agg()` is a named tuple\
    \ `result_column=('source_column', 'function')`. Use `\"size\"` to count all rows\
    \ (including `NaN`); use `\"count\"` to count only non-`NaN` rows.\n"
