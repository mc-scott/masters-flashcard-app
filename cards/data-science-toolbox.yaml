- topic: Pandas
  title: Enforcing a capacity limit with a `reserves` list inside a `for` loop
  prompt: How do you split eligible items into an `inside` list (up to a capacity)
    and a `reserves` list using a `for` loop?
  answer: "Check both the eligibility condition and the current size of `inside` before\
    \ appending:\n\n```python\ncapacity = 5\nrefused  = []\ninside   = []\nreserves\
    \ = []\n\nfor person in details:\n    if person[1] >= min_age:\n        if len(inside)\
    \ < capacity:\n            inside.append(person[0])\n        else:\n         \
    \   reserves.append(person[0])\n    else:\n        refused.append(person[0])\n\
    ```\n\nThe **outer** condition tests eligibility; the **inner** condition tests\
    \ remaining space. This pattern shows how nested `if` statements are used inside\
    \ loops.\n"
  reference: conditionals-loops-workbook.ipynb
