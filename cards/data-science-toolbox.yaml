- topic: Git
  title: What is version control?
  prompt: What is version control and why is it used in software development?
  answer: 'Version control is a system that records changes to a file or set of files
    over time,

    allowing you to recall and monitor every update to the codebase.


    - Tracks who changed what and when, with explanatory messages

    - Enables many people to collaborate without overwriting each other''s work

    - Keeps the project directory clean while retaining the full history

    - Allows switching between different versions of the code (branches)

    '
  reference: notebooks/git/intro_to_git.ipynb
- topic: Git
  title: Centralised vs distributed version control
  prompt: What is the difference between a centralised and a distributed version control
    system?
  answer: "- **Centralised** (e.g. Subversion): one central server holds the full\
    \ history;\n  clients only have a working copy.\n- **Distributed** (e.g. Git):\
    \ every client has a complete copy of the repository,\n  including the full history.\
    \ Changes are synchronised between copies.\n\nGit is the de facto industry-standard\
    \ distributed VCS.\n"
  reference: notebooks/git/intro_to_git.ipynb
- topic: Git
  title: Git's four-stage workflow
  prompt: What are the four stages that a file change moves through in Git?
  answer: '1. **Working directory** — where you edit files; Git monitors changes here.

    2. **Staging area** — changed files are `git add`-ed here to be included in the
    next commit.

    3. **Git directory (`.git`)** — stores the committed history with messages; must
    not be deleted.

    4. **Remote repository** — a server copy that teammates can push to and pull from.

    '
  reference: notebooks/git/intro_to_git.ipynb
- topic: Pandas
  title: Why new files are not tracked by default
  prompt: When you create a new file in a Git repository, is it tracked automatically?
    What must you do?
  answer: 'No. Git ignores brand-new files until they are explicitly staged for the
    first time.

    This lets you keep files you don''t want tracked (e.g. credentials, large data
    files)

    out of version control.


    Stage a new file with:

    ```bash

    git add filename.py

    ```

    After the first `git add`, Git tracks all future changes in that file.

    '
  reference: notebooks/git/intro_to_git.ipynb
- topic: Git
  title: Staging changes with `git add`
  prompt: What does `git add` do, and what does `git status` show after you run it?
  answer: '`git add <file>` moves a file (or its changes) to the **staging area**
    so it will

    be included in the next commit.


    After staging, `git status` shows the file under **"Changes to be committed"**.


    ```bash

    git add hello.py

    git status

    ```

    '
  reference: notebooks/git/intro_to_git.ipynb
- topic: Git
  title: Committing staged changes with `git commit`
  prompt: How do you create a commit from your staged changes, and what does the commit
    message do?
  answer: 'Use `git commit -m` followed by a short, descriptive message:


    ```bash

    git commit -m "Create hello.py file"

    ```


    - The commit permanently records the staged changes in the project history.

    - The message explains *why* the change was made — vital for your future self
    and colleagues.

    - After committing, `git status` will show "nothing to commit, working tree clean".

    '
  reference: notebooks/git/intro_to_git.ipynb
- topic: Git
  title: Viewing commit history with `git log`
  prompt: How do you view the history of commits in a Git repository?
  answer: '`git log` lists commits in reverse chronological order, showing author,
    date, and message.


    Add `-p` to see the line-by-line changes (patch) included in each commit:


    ```bash

    git log       # summary list

    git log -p    # full diff for each commit

    ```

    '
  reference: notebooks/git/intro_to_git.ipynb
- topic: Git
  title: Pushing commits to a remote with `git push`
  prompt: What does `git push` do, and what flag is needed the first time you push
    a branch?
  answer: '`git push` sends new local commits to the remote repository.

    It does **not** overwrite the remote; it applies each commit as a patch.


    For the first push of a branch, use `--set-upstream origin <branch>` to tell

    Git which remote branch to link to:


    ```bash

    git push --set-upstream origin main

    ```


    Subsequent pushes on the same branch only need `git push`.

    '
  reference: notebooks/git/intro_to_git.ipynb
- topic: Git
  title: Creating a bare (remote) repository with `git init --bare`
  prompt: How do you create a local bare repository to act as a remote?
  answer: 'Use `git init --bare` with an `.git` suffix by convention:


    ```bash

    git init --bare --initial-branch=main cspark-demo.git

    ```


    A bare repository stores only the version history (no working directory).

    It is the standard layout for a server-side remote.

    '
  reference: notebooks/git/git_practical-solution.ipynb
- topic: Git
  title: Cloning a repository with `git clone`
  prompt: How do you clone a repository to create a local working copy?
  answer: 'Use `git clone <URL>` to copy the remote repository (including its full
    history)

    into a new local directory:


    ```bash

    git clone file://$(pwd)/cspark-demo.git/ local_repo

    ```


    The `file://` protocol works for a local path; replace with `https://` or `git@`
    for remote servers.

    '
  reference: notebooks/git/git_practical-solution.ipynb
- topic: Git
  title: Checking repository status with `git status`
  prompt: What does `git status` tell you, and when should you use it?
  answer: '`git status` shows:

    - Untracked files (new files not yet staged)

    - Modified files not yet staged

    - Files staged and ready to commit

    - Whether your branch is ahead of or behind the remote


    Run it frequently to understand the state of your working directory before staging
    or committing.

    '
  reference: notebooks/git/git_practical-solution.ipynb
- topic: Git
  title: Showing unstaged changes with `git diff`
  prompt: How do you view the line-by-line differences between two commits or branches?
  answer: '`git diff` shows changes not yet staged. To compare two branches (a patch
    / diff):


    ```bash

    git diff main..function_update

    ```


    The output header `@@ -1 +1,3 @@` means: the original file had 1 line starting
    at line 1;

    the new version has 3 lines starting at line 1.

    '
  reference: notebooks/git/git_practical-solution.ipynb
- topic: Git
  title: Creating a branch with `git checkout -b`
  prompt: How do you create a new branch and switch to it in one step?
  answer: 'Use `git checkout -b <branch-name>`:


    ```bash

    git checkout -b function_update

    ```


    After this, new commits are recorded on the new branch only.

    List all local branches with `git branch`; switch back with `git checkout main`.

    '
  reference: notebooks/git/git_practical-solution.ipynb
- topic: Git
  title: Merging a branch into `main`
  prompt: What is the typical workflow to merge a feature branch into `main`?
  answer: "1. **Push** the feature branch to the remote:\n   ```bash\n   git push\
    \ --set-upstream origin function_update\n   ```\n2. Open a **merge request** (GitLab)\
    \ or **pull request** (GitHub/Bitbucket)\n   in the web interface and assign reviewers.\n\
    3. After approval, merge on the platform.\n4. **Pull** the merged `main` locally\
    \ and delete the feature branch:\n   ```bash\n   git checkout main\n   git pull\n\
    \   git branch -D function_update\n   ```\n"
  reference: notebooks/git/git_practical-solution.ipynb
- topic: Git
  title: Key Git terminology
  prompt: What do the terms repository, fork, branch, pull/merge request, and conflict
    mean in Git?
  answer: '- **Repository** — the remote (online) version of a Git project.

    - **Fork** — a personal copy of someone else''s repository; your commits don''t
    affect the original.

    - **Branch** — a separate line of commit history within a repository.

    - **Pull/Merge Request** — a formal request to merge one branch into another,
    enabling code review.

    - **Conflict** — occurs when two commits change the same lines; must be resolved
    manually.

    '
  reference: notebooks/git/intro_to_git.ipynb
- topic: Python
  title: Why use Python for data analysis?
  prompt: What advantages does Python offer over spreadsheet tools like Excel for
    data analysis?
  answer: 'Python provides key advantages for data analysis:


    - **Handles larger data volumes** more robustly and repeatably than Excel

    - **Repeated operations** are carried out more efficiently

    - **Logic is transparent** — not hidden within a UI as in spreadsheets

    - Rich ecosystem: packages for data processing, APIs, web scraping, ML, and visualisation

    '
  reference: module-1.md
- topic: Python
  title: Python Standard Library vs packages vs sub-modules
  prompt: What is the difference between the Standard Library, a package, and a sub-module
    in Python?
  answer: "- **Standard Library** — built-in modules shipped with Python (e.g. `json`,\
    \ `datetime`, `math`):\n  ```python\n  import json\n  ```\n- **Package (library)**\
    \ — additional installable code (e.g. `pandas`, `sklearn`):\n  ```python\n  import\
    \ pandas as pd\n  ```\n- **Sub-module** — a specific module within a package,\
    \ imported directly:\n  ```python\n  from sklearn.metrics import consensus_score\n\
    \  ```\n"
  reference: module-1.md
- topic: Python
  title: Package dependencies in Python
  prompt: What are package dependencies, and why do they matter when installing packages?
  answer: 'Packages often rely on other packages to function — these are called **dependencies**,
    and all must be installed for the package to work.


    For example, `pandas` depends on:

    - `setuptools`

    - `NumPy`

    - `python-dateutil`

    - `pytz`


    The Anaconda Distribution pre-installs these common dependencies automatically.

    '
  reference: module-1.md
- topic: Python
  title: Purpose of Python virtual environments
  prompt: What problem do Python environments solve, and what are the two key benefits?
  answer: 'Environments allow **multiple combinations of packages and versions** to
    coexist on a single machine.


    **Benefits:**

    - **Reproducibility** — code runs the same way in future or on different machines

    - **Isolation** — enables working on projects with conflicting dependencies simultaneously


    With 250,000+ projects on PyPI and 2,000,000+ releases, dependency conflicts are
    common without environments.

    '
  reference: module-1.md
- topic: Python
  title: Key Conda commands
  prompt: What are the essential Conda commands for managing environments and packages?
  answer: '| Command | Purpose |

    |---|---|

    | `conda create --name mynewenv` | Create a new environment |

    | `conda activate mynewenv` | Activate an environment |

    | `conda install flask` | Install a package |

    | `conda install flask=1.1.2` | Install a specific version |

    | `conda list` | List installed packages and versions |

    | `conda env export > environment.yml` | Export environment to a YAML file |

    | `conda env create -f environment.yml` | Recreate environment from YAML |

    '
  reference: module-1.md
- topic: Python
  title: Conda vs virtualenv/pip — when to use each
  prompt: What is the difference between conda and virtualenv/pip, and when should
    you use each?
  answer: '- **conda** — handles both environment management *and* package installation

    - **virtualenv** — handles environments only; typically paired with **pip** for
    packages


    **General guidance:**

    - Create a new environment with `conda` for each new project

    - Use `conda` for package installations when available

    - Use `pip` if there is no conda equivalent for the package

    '
  reference: module-1.md
- topic: Git
  title: Git stash — saving and restoring work in progress
  prompt: How do you temporarily save uncommitted work in Git and later restore it?
  answer: '**Stash** current staged and unstaged changes:

    ```bash

    git stash

    ```

    **List** all stashes:

    ```bash

    git stash list

    ```

    **Apply** a specific stash (keeps it in the list):

    ```bash

    git stash apply stash@{2}

    ```

    **Reapply** the most recent stash and remove it from the list:

    ```bash

    git stash pop

    ```

    '
  reference: module-1.md
- topic: Git
  title: Git reset — soft, mixed, and hard
  prompt: What are the three types of `git reset`, and what does each one affect?
  answer: '| Type | Effect |

    |---|---|

    | `--soft` | Moves HEAD; keeps changes **staged** |

    | `--mixed` (default) | Moves HEAD; **unstages** changes, keeps them in working
    directory |

    | `--hard` | Moves HEAD; **discards all changes** — dangerous, can lose work |


    **Examples:**

    ```bash

    git reset --soft HEAD~      # one commit back, changes staged

    git reset --mixed HEAD~2    # two commits back, changes unstaged

    git reset --hard HEAD~2     # two commits back, changes LOST

    ```

    '
  reference: module-1.md
- topic: Git
  title: Git rebase — replaying a branch onto another
  prompt: What is `git rebase` and how do you rebase a feature branch onto `master`?
  answer: '`git rebase` replays the commits of one branch on top of another, producing
    a cleaner linear history.


    ```bash

    git checkout branch_to_rebase

    git rebase master

    ```


    This moves the base of `branch_to_rebase` to the tip of `master`, replaying its
    commits on top.

    '
  reference: module-1.md
- topic: Git
  title: Checking out a file from another branch or commit
  prompt: How do you restore a single file from another branch or a specific commit
    in Git?
  answer: '**From another branch:**

    ```bash

    git checkout other_branch -- file_to_checkout.py

    ```

    **From a specific commit:**

    ```bash

    git checkout <COMMIT_HASH> file_to_checkout.py

    ```

    **Reset a file to HEAD state:**

    ```bash

    git checkout -- file_to_reset.py

    ```

    '
  reference: module-1.md
- topic: Pandas
  title: Aggregating a DataFrame column with `.mean()` and `.max()`
  prompt: How do you calculate the mean and maximum of a pandas DataFrame column?
  answer: 'Use the built-in aggregation methods on a column (Series):

    ```python

    mean_weight = df[''weight''].mean()

    max_horsepower = df[''horsepower''].max()

    ```

    These return a single scalar value computed from all non-null values in the column.

    '
  reference: notebooks/assignments/cars.ipynb
- topic: Pandas
  title: Counting rows that match a condition
  prompt: How do you count the number of rows in a DataFrame that satisfy a condition?
  answer: 'Use boolean indexing combined with `.shape[0]`:

    ```python

    heavy_cars = df[df[''weight''] >= 3500].shape[0]

    ```

    `.shape[0]` returns the row count of the filtered DataFrame.

    '
  reference: notebooks/assignments/cars.ipynb
- topic: Pandas
  title: Dropping rows with missing values using `.dropna()`
  prompt: How do you remove rows containing missing values from a pandas DataFrame?
  answer: 'Use `.dropna()` on a copy of the DataFrame to avoid modifying the original:

    ```python

    df_horsepower = df.copy()

    df_horsepower = df_horsepower.dropna()

    ```

    This removes any row containing at least one `NaN` value.

    '
  reference: notebooks/assignments/cars.ipynb
- topic: Pandas
  title: Finding the mode of a column with `.mode()[0]`
  prompt: How do you find the modal (most frequent) value of a pandas column?
  answer: 'Use `.mode()` on the column. Since there may be multiple modes, `.mode()`
    returns an array — use `[0]` to get the first value:

    ```python

    mode_hp = df_horsepower[''horsepower''].mode()[0]

    ```

    '
  reference: notebooks/assignments/cars.ipynb
- topic: Pandas
  title: Concatenating string columns with `.str.cat()`
  prompt: How do you combine two DataFrame columns into a single string column in
    pandas?
  answer: "Use `.str.cat()` on a string column, passing the second column and a separator:\n\
    ```python\ndf_name['name_year'] = df_name['name'].str.cat(\n    df_name['model_year'].astype('str'),\
    \ sep=' - 19'\n)\n```\nUse `.astype('str')` to convert non-string columns before\
    \ concatenation.\n"
  reference: notebooks/assignments/cars.ipynb
- topic: Pandas
  title: Looking up a value by custom index using a function
  prompt: How do you write a function that retrieves a column value for a given index
    entry after setting a custom DataFrame index?
  answer: "Set a meaningful column as the index, then filter by index equality and\
    \ extract with `.values[0]`:\n```python\ndf_car_index = df_name.set_index('name_year')\n\
    \ndef acceleration(name_year):\n    return df_car_index[df_car_index.index ==\
    \ name_year]['acceleration'].values[0]\n\nacceleration('ford torino - 1970')\n\
    ```\n"
  reference: notebooks/assignments/cars.ipynb
- topic: Pandas
  title: Filtering out a specific row value using `!=`
  prompt: How do you remove rows where a column equals a specific value when cleaning
    a DataFrame?
  answer: 'Use boolean indexing with `!=` on the relevant column, working from a copy:

    ```python

    countries = df.copy()

    countries = countries[countries[''location''] != ''World'']

    ```

    This removes any row where `location` equals `''World''`, leaving all other rows
    intact.

    '
  reference: notebooks/assignments/coronavirus.ipynb
- topic: Pandas
  title: Selecting and sorting columns with `.loc[]` and `.sort_values()`
  prompt: How do you select a subset of columns from a DataFrame and sort by one of
    them in descending order?
