- topic: Pandas
  title: Sampling every nth row with the slice step operator
  prompt: How do you select every nth row from a DataFrame using Python slice syntax?
  answer: 'Use the `::` (step) slice operator on a DataFrame — `df[::n]` returns every
    nth row:


    ```python

    df = df[::10]   # keeps row 0, 10, 20, 30, ...

    ```

    '
  reference: notebooks/assignments/human_development_index.ipynb
- topic: Pandas
  title: Scaling values relative to the minimum
  prompt: How do you rescale a column so that the smallest value maps to a given base
    size and all others scale proportionally?
  answer: 'Divide the column by its minimum, then multiply by the base size:


    ```python

    min_population = df[''Population''].min()

    df[''Ratio''] = (df[''Population''] / min_population) * 100

    ```


    The row with the minimum population gets a ratio of 100; all others are proportionally
    larger.

    '
  reference: notebooks/assignments/human_development_index.ipynb
- topic: Pandas
  title: Binning a continuous column into quantile groups with `pd.qcut()`
  prompt: How do you split a continuous column into equal-frequency bins with custom
    labels?
  answer: 'Use `pd.qcut()` with `q` (number of bins) and `labels`:


    ```python

    df[''Popn. category''] = pd.qcut(df[''Population''], q=3, labels=[''Small'', ''Medium'',
    ''Large''])

    ```


    Each bin contains approximately the same number of rows.

    '
  reference: notebooks/assignments/human_development_index.ipynb
- topic: Pandas
  title: Creating a row MultiIndex with `.pivot().stack()`
  prompt: How do you convert a column MultiIndex into a row MultiIndex?
  answer: '`.pivot()` creates a column MultiIndex. Chaining `.stack()` moves the innermost
    column level into the row index:


    ```python

    df_multi_index = df_category.pivot(index=''Popn. category'', columns=''Entity'').stack()

    ```

    '
  reference: notebooks/assignments/human_development_index.ipynb
- topic: Pandas
  title: Selecting from a MultiIndex with `.loc`
  prompt: How do you select rows belonging to a specific level of a row MultiIndex
    using `.loc`?
  answer: 'Pass the outer index label as the first argument to `.loc`:


    ```python

    df_medium = df_multi_index.loc[''Medium'', :]

    ```

    '
