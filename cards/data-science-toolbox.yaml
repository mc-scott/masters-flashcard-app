- topic: Pandas
  title: Creating a column MultiIndex in pandas
  prompt: How do you create a DataFrame with a hierarchical column index?
  answer: "```python\n# From tuples\ncolumns = pd.MultiIndex.from_tuples(\n    [('profit',\
    \ 'online'), ('profit', 'in-store'), ('revenue', 'online')]\n)\n\n# From arrays\n\
    columns = pd.MultiIndex.from_arrays(\n    [['profit', 'profit', 'revenue'], ['online',\
    \ 'in-store', 'online']]\n)\n\ndf = pd.DataFrame([...], columns=columns)\n```\n\
    Access values by chaining: `df['profit']['online']`, or with `loc`: `df.loc[:,\
    \ ('profit', 'online')]`.\n"
  reference: notebooks/pandas/further-pandas-interactive.ipynb
- topic: Pandas
  title: Creating and accessing a row MultiIndex with `.loc[]`
  prompt: How do you create a DataFrame with a hierarchical row index and access subsets
    of it?
  answer: "```python\nindex = pd.MultiIndex.from_tuples(\n    [('GB', 'London'), ('GB',\
    \ 'Cambridge'), ('US', 'New York')]\n)\ndf = pd.DataFrame([...], index=index)\n\
    \n# Access all rows for top-level label 'GB'\ndf.loc[\"GB\", :]\n\n# Access specific\
    \ country + city\ndf.loc[(\"GB\", \"London\"), :]\n```\nThe row MultiIndex is\
    \ passed as the `index` parameter. Use `.loc[label, :]` for the top level, or\
    \ `.loc[(level0, level1), :]` to navigate deeper.\n"
  reference: notebooks/pandas/further-pandas-interactive.ipynb
- topic: Pandas
  title: Transposing MultiIndex hierarchies with `stack()` and `unstack()`
  prompt: What do `stack()` and `unstack()` do in the context of a MultiIndex DataFrame?
  answer: '```python

    # stack: inner column index level → inner row index level

    df_stacked = df.stack(future_stack=True)


    # unstack: inner row index level → inner column index level

    df_unstacked = df_stacked.unstack()

    ```

    `stack()` pivots the innermost column level to become an innermost row level.
    `unstack()` reverses this. The hierarchy is preserved but transposed — conceptually
    similar to `melt()`/`pivot()` but for MultiIndex DataFrames.

    '
  reference: notebooks/pandas/further-pandas-interactive.ipynb
- topic: Pandas
  title: Tabulating values across two columns with `pd.crosstab()`
  prompt: How do you use `pd.crosstab()` to summarise values across two categorical
    columns?
  answer: "```python\npd.crosstab(\n    df['Country'],\n    columns=df['Type'],\n\
    \    values=df['Profit'],\n    aggfunc='sum'\n)\n```\nWithout `values`/`aggfunc`,\
    \ `crosstab()` counts occurrences (frequency table). With them it aggregates like\
    \ `pivot_table()`. Best for simple analyses; `pivot_table()` is more flexible\
    \ for complex queries.\n"
  reference: notebooks/pandas/further-pandas-interactive.ipynb
- topic: Pandas
  title: Binning numerical data with `cut()` and encoding categoricals with `factorize()`
  prompt: How do you convert numerical data into discrete categories, and how do you
    encode a categorical column as integers?
  answer: '```python

    # cut: bin values into N equal-width intervals

    a = np.linspace(0, 9, 10)

    binned = pd.cut(a, bins=2)

    # returns Categorical of intervals, e.g. (-0.009, 4.5] and (4.5, 9.0]


    # factorize: map each unique value to an integer code

    codes, uniques = pd.factorize(pd.Series([''GB'', ''GB'', ''US'', ''FR'', ''GB'']))

    # codes:   [0, 0, 1, 2, 0]

    # uniques: Index([''GB'', ''US'', ''FR''])

    uniques[codes[0]]  # → ''GB''

    ```

    `cut()` replaces values with their bin interval. `factorize()` assigns integer
    codes — useful for compressing repeated strings or downstream categorical analysis.

    '
  reference: notebooks/pandas/further-pandas-interactive.ipynb
- topic: Pandas
  title: Summarising data with `pd.pivot_table()` and `aggfunc='sum'`
  prompt: How do you use `pivot_table()` to sum multiple value columns grouped by
    a row index?
  answer: "```python\nsummary = pd.pivot_table(\n    df,\n    values=['Sales', 'Revenue',\
    \ 'Cost'],\n    index='Region',\n    aggfunc='sum'\n)\n```\n`values` lists the\
    \ columns to aggregate; `index` sets the grouping column (becomes the row index).\
    \ `aggfunc` controls the aggregation — defaults to `'mean'` if omitted.\n"
  reference: notebooks/pandas/further-pandas-practical1-solution.ipynb
- topic: Pandas
  title: Filtering a melted DataFrame using string methods
  prompt: After using `melt()`, how do you clean whitespace and filter rows based
    on partial string matches in the variable column?
  answer: '```python

    long = pd.melt(df, id_vars=''Country'', var_name=''Metric'', value_name=''Measurement'')


    # Clean whitespace, then filter by partial match

    long[''Metric''] = long[''Metric''].str.strip()

    filtered = long[long[''Metric''].str.contains(''Population'')].copy()

    filtered = filtered.set_index(''Metric'').drop(''Country'', axis=1)

    ```

    Use `.str.strip()` to remove leading/trailing whitespace. `.str.contains()` filters
    rows by substring match. Call `.copy()` on the filtered result to avoid `SettingWithCopyWarning`.

    '
  reference: notebooks/pandas/further-pandas-practical1-solution.ipynb
- topic: Pandas
  title: Avoiding `SettingWithCopyWarning` with `.copy()`
  prompt: When is it necessary to call `.copy()` after filtering a DataFrame, and
    what problem does it prevent?
  answer: 'Without `.copy()`, a filtered DataFrame may be a **view** of the original
    rather than an independent object. Modifying a view can silently modify the original
    and triggers `SettingWithCopyWarning`:

    ```python

    # Risky — may be a view

    filtered = df[df[''col''] > 0]

    filtered[''new_col''] = 1  # may affect df too


    # Safe — guaranteed independent copy

    filtered = df[df[''col''] > 0].copy()

    filtered[''new_col''] = 1

    ```

    Always call `.copy()` when you plan to modify a filtered subset of a DataFrame.

    '
  reference: notebooks/pandas/further-pandas-practical1-solution.ipynb
- topic: Pandas
  title: Creating a MultiIndex for all combinations with `from_product()`
  prompt: How do you create a MultiIndex that covers every combination of two lists?
  answer: "```python\nindex = pd.MultiIndex.from_product(\n    [['2020', '2021'],\
    \ ['Q1', 'Q2', 'Q3', 'Q4']],\n    names=['year', 'quarter']\n)\n```\n`from_product()`\
    \ generates the Cartesian product of the input lists — every combination of `year\
    \ × quarter` (8 entries here). `names=` labels each level of the hierarchy.\n"
  reference: notebooks/pandas/further-pandas-practical2-solution.ipynb
- topic: Pandas
  title: Grouping by multiple columns and reshaping the result with `unstack()`
  prompt: How do you group a DataFrame by two columns to get a MultiIndex result,
    then move one index level to columns?
  answer: '```python

    gb = df.groupby([''Region'', ''Net inward migration''])[[''Birthrate'', ''Deathrate'']].mean()

    # gb has a row MultiIndex: (Region, Net inward migration)


    wide = gb.unstack()

    # Moves ''Net inward migration'' from rows → columns, creating a column MultiIndex

    ```

    `.groupby()` on a list of columns produces a MultiIndex on the rows. `.unstack()`
    pivots the inner row index level to become an inner column index level.

    '
  reference: notebooks/pandas/further-pandas-practical2-solution.ipynb
- topic: Pandas
  title: Removing a level from a column MultiIndex with `droplevel()`
  prompt: How do you remove an unwanted level from a column MultiIndex after unstacking?
  answer: '```python

    # After unstack(), columns become MultiIndex:

    # (''Birthrate'', True), (''Birthrate'', False), (''Deathrate'', True), ...


    df.columns = df.columns.droplevel(1)

    # → Index([''Birthrate'', ''Birthrate'', ''Deathrate'', ''Deathrate''])

    ```

    `droplevel(level)` removes the specified level (by position or name) from the
    column MultiIndex. Assign back to `df.columns` to apply the change.

    '
  reference: notebooks/pandas/further-pandas-practical2-solution.ipynb
- topic: Pandas
  title: Sorting a DataFrame by a MultiIndex column using a tuple key
  prompt: How do you sort a DataFrame by a column that has a MultiIndex (tuple) header?
  answer: '```python

    df.sort_values(by=(''Birthrate'', False), ascending=False)

    ```

    When columns are a MultiIndex, pass a **tuple** to `by=` in `sort_values()`. The
    tuple must exactly match the level values of the target column — e.g. `(''Birthrate'',
    False)` selects the column at level-0 `''Birthrate''` and level-1 `False`.

    '
  reference: notebooks/pandas/further-pandas-practical2-solution.ipynb
- topic: Pandas
  title: '`pd.cut()` vs `pd.qcut()` — equal-width vs equal-frequency binning'
  prompt: What is the key difference between `pd.cut()` and `pd.qcut()`, and when
    should you use each?
  answer: "| Function | Bins are... | Use when... |\n|---|---|---|\n| `pd.cut()` |\
    \ **equal width** (same value range per bin) | you care about the scale of values\
    \ |\n| `pd.qcut()` | **equal frequency** (same number of rows per bin) | you want\
    \ balanced groups |\n\n```python\n# Equal-width bins — 3 value ranges\ndf['Income\
    \ group (amount)'] = pd.cut(\n    df['GDP ($ per capita)'], bins=3, labels=['Low',\
    \ 'Medium', 'High']\n)\n\n# Equal-frequency bins — 3 groups with ~same number\
    \ of countries\ndf['Income group (number)'] = pd.qcut(\n    df['GDP ($ per capita)'],\
    \ 3, labels=['Low', 'Medium', 'High']\n)\n```\n"
  reference: notebooks/pandas/further-pandas-practical3-solution.ipynb
- topic: Pandas
  title: Counting rows per group combination with `.groupby().size()` and `.unstack()`
  prompt: How do you count the number of rows for each combination of two categorical
    columns and display the result as a matrix?
  answer: 'Use `.groupby()` with a list of columns, then call `.size()` to count rows.
    Chain `.unstack()` to pivot the inner index level into columns:


    ```python

    reg_inc = df.groupby([''Region'', ''Income group (number)'']).size()

    # Returns a Series with a MultiIndex: (Region, Income group)


    reg_inc.unstack()

    # Moves ''Income group'' from rows → columns — easy-to-read matrix view

    ```


    `.size()` counts **all** rows (including those with `NaN`). Use `.count()` to
    exclude `NaN`.

    '
  reference: notebooks/pandas/further-pandas-practical3-solution.ipynb
- topic: Pandas
  title: Quick DataFrame exploration with `.head()`, `.tail()`, and `.sample()`
  prompt: What pandas methods give you a quick first look at the rows in a DataFrame?
  answer: '| Method | Returns |

    |---|---|

    | `df.head(n)` | First **n** rows (default 5) |

    | `df.tail(n)` | Last **n** rows (default 5) |

    | `df.sample(n)` | **n** random rows |


    ```python

    df.head()     # first 5 rows

    df.tail(3)    # last 3 rows

    df.sample(3)  # 3 random rows

    ```


    These are the standard first steps of **Exploratory Data Analysis (EDA)**.

    '
  reference: notebooks/pandas/intro-to-pandas-interactive.ipynb
- topic: Pandas
  title: Inspecting DataFrame structure with `.info()`
  prompt: What does `df.info()` show, and what is each part useful for?
  answer: '`.info()` prints a compact summary of a DataFrame:


    - **RangeIndex** — number of rows

    - **Non-Null Count** — how many values are present (not `NaN`) in each column

    - **Dtype** — the pandas type of each column (`object`, `int64`, `float64`, `bool`,
    `datetime64`, …)


    ```python

    df.info()

    df.dtypes   # just the data type for each column

    ```


    Use it to quickly spot **missing values** and confirm columns have the correct
    type.

    '
  reference: notebooks/pandas/intro-to-pandas-interactive.ipynb
- topic: Pandas
  title: Summarising numerical columns with `.describe()`
  prompt: What statistics does `df.describe()` return for each numerical column?
  answer: '`.describe()` returns **8 descriptive statistics** per numeric column:


    | Statistic | Meaning |

    |---|---|

    | `count` | Non-null value count |

    | `mean` | Average |

    | `std` | Standard deviation |

    | `min` | Minimum |

    | `25%` / `50%` / `75%` | Quartiles |

    | `max` | Maximum |


    ```python

    df.describe()

    ```


    Use it to assess the **range, distribution, and skew** of numeric columns.

    '
  reference: notebooks/pandas/intro-to-pandas-interactive.ipynb
- topic: Pandas
  title: Getting DataFrame dimensions with `.shape`
  prompt: How do you find out how many rows and columns a pandas DataFrame has?
  answer: 'The `.shape` **attribute** (no parentheses) returns a `tuple` of `(rows,
    columns)`:


    ```python

    df.shape          # e.g. (7043, 21)

    rows = df.shape[0]   # 7043

    cols = df.shape[1]   # 21

    ```


    `.shape[0]` is equivalent to `len(df)` for the row count, but `.shape` also provides
    the column count in a single call.

    '
  reference: notebooks/pandas/intro-to-pandas-interactive.ipynb
- topic: Pandas
  title: Position-based indexing with `.iloc[]`
  prompt: How do you select rows and columns from a DataFrame by their integer position?
  answer: '`.iloc[rows, columns]` uses **zero-based integer positions**. Upper bounds
    are **exclusive** (like Python lists):


    ```python

    df.iloc[0:3, 0:5]        # rows 0–2, columns 0–4

    df.iloc[0:3, [0, 1, 9]]  # rows 0–2, specific columns by position

    df.iloc[0:3, :]          # rows 0–2, all columns

    df.iloc[0]               # single row → returns a Series

    df.iloc[:, 0]            # single column → returns a Series

    ```


    If the row/column position is out of range, an **empty DataFrame** (not an error)
    is returned.

    '
  reference: notebooks/pandas/intro-to-pandas-interactive.ipynb
- topic: Pandas
  title: Label-based indexing with `.loc[]`
  prompt: How does `.loc[]` differ from `.iloc[]`, and why is it considered more robust?
  answer: '`.loc[rows, columns]` selects by **row labels and column names** — not
    integer positions:


    ```python

    df.loc[0:3, [''customerid'', ''tenure'', ''churn'']]

    df.loc[:, ''customerid'']   # all rows, one column

    ```


    **Key difference vs `.iloc[]`:**

    - `.iloc[0:3]` returns rows at positions 0, 1, 2 (stop is **exclusive**)

    - `.loc[0:3]` returns rows with labels 0, 1, 2, 3 (stop is **inclusive**)


    `.loc[]` is **more robust**: re-ordering or removing rows won''t silently return
    the wrong data.

    '
  reference: notebooks/pandas/intro-to-pandas-interactive.ipynb
- topic: Pandas
  title: Selecting columns with bracket notation vs dot notation
  prompt: What are the two ways to select a column from a pandas DataFrame, and when
    does each work?
  answer: '```python

    df[''tenure'']                  # bracket notation — always works

    df.tenure                     # dot notation — shorter, but limited


    df[[''customerid'', ''tenure'']]  # multiple columns → returns a DataFrame

    ```


    **Dot notation limitations:**

    - Fails if the column name contains **spaces** or **special characters**

    - Cannot be used to **create new columns**


    Use bracket notation whenever in doubt.

    '
  reference: notebooks/pandas/intro-to-pandas-interactive.ipynb
- topic: Pandas
  title: Filtering DataFrame rows with a boolean mask
  prompt: How do you select rows from a DataFrame that match a condition?
  answer: 'Create a boolean Series (the **mask**), then pass it inside square brackets
    to filter the DataFrame:


    ```python

    phone_mask = df[''phoneservice''] == ''Yes''

    phones = df[phone_mask]


    # Inline version

    phones = df[df[''phoneservice''] == ''Yes'']

    ```


    The mask is a Series of `True`/`False` — one per row. Only rows where the mask
    is `True` are returned.


    For string-based filters, use `.str` accessor methods:

    ```python

    df[df[''paymentmethod''].str.contains(''Electronic'')]

    ```

    '
  reference: notebooks/pandas/intro-to-pandas-interactive.ipynb
- topic: Pandas
  title: Combining filter conditions with `&` and `|`
  prompt: How do you filter a DataFrame using multiple conditions joined with AND
    or OR?
  answer: 'Wrap **each condition in parentheses**, then combine with `&` (AND) or
    `|` (OR):


    ```python

    # AND — both conditions must be True

    pt_mask = (df[''phoneservice''] == ''Yes'') & (df[''tenure''] >= 24)


    # OR — either condition can be True

    pi_mask = (df[''phoneservice''] == ''Yes'') | (df[''internetservice''] == ''Fiber
    optic'')


    df[pt_mask]

    ```


    Do **not** use Python''s `and`/`or` keywords — they do not work element-wise on
    Series. Always use `&` and `|`, and always parenthesise each condition.

    '
  reference: notebooks/pandas/intro-to-pandas-interactive.ipynb
- topic: Pandas
  title: Updating a single DataFrame cell with `.loc[]`
  prompt: How do you overwrite the value in a specific row and column of a DataFrame?
  answer: 'Use `.loc[row_label, column_name] = new_value` to target a single cell,
    or pass a list of columns to update several at once:


    ```python

    df.loc[2233, ["Weekly hours open", "Weekly hours staffed"]] = 57

    ```


    Always work on a **copy** of the DataFrame to avoid accidentally modifying the
    original:

    ```python

    new_df = df.copy()

    new_df.loc[0, ''paperlessbilling''] = ''No''

    ```

    '
  reference: notebooks/pandas/intro-to-pandas-workbook-solution.ipynb
- topic: Pandas
  title: Calculating the percentage of rows meeting a condition with `len()`
  prompt: How do you compute what percentage of rows in a DataFrame satisfy a given
    filter?
  answer: "Divide the count of filtered rows by the total row count, then multiply\
    \ by 100:\n\n```python\npct_zero_hours = (\n    len(df_open[df_open['Weekly hours\
    \ open'] == 0]) / len(df_open) * 100\n)\n```\n\n`len(df)` returns the number of\
    \ rows. The overall pattern is:\n`len(filtered_df) / len(df) * 100`\n"
  reference: notebooks/pandas/intro-to-pandas-workbook-solution.ipynb
- topic: Pandas
  title: Creating a compound ID column by concatenating strings with `.astype(str)`
  prompt: How do you build a new column whose values combine a string column and an
    integer column?
  answer: "Convert the integer column to `str` first using `.astype(str)`, then concatenate\
    \ with `+`:\n\n```python\noutlets_detail['new_id'] = (\n    outlets_detail['Region']\
    \ + '_' + outlets_detail['location_id'].astype(str)\n)\n# e.g. 'Europe_1', 'Americas_3'\n\
    ```\n\nPandas cannot directly concatenate `str` and `int` Series with `+` — `.astype(str)`\
    \ converts the integer column to strings first.\n"
  reference: notebooks/pandas/processing-pandas-workbook-solution.ipynb
- topic: Pandas
  title: Classifying rows into categories with a lookup function and `.apply()`
  prompt: How do you create a new categorical column based on membership in predefined
    lists?
  answer: "Define a function that checks membership in each list and returns the category\
    \ label, then apply it to a column:\n\n```python\nEUROPE   = ['UK', 'Italy', 'France',\
    \ 'Germany', 'Ireland']\nAMERICAS = ['Argentina', 'Brazil', 'USA']\n\ndef region(country):\n\
    \    if country in EUROPE:\n        return 'Europe'\n    elif country in AMERICAS:\n\
    \        return 'Americas'\n    else:\n        return 'Other'\n\noutlets_detail['Region']\
    \ = outlets_detail['Country'].apply(region)\n```\n\n`.apply()` calls the function\
    \ once per cell and stores the returned label as the new column value.\n"
  reference: notebooks/pandas/processing-pandas-workbook-solution.ipynb
- topic: Python
  title: Python Boolean operators — `and`, `or`, `not`
  prompt: What do the Boolean operators `and`, `or`, and `not` do when combining conditions?
  answer: '- **`and`** — both operands must be `True` to produce `True`

    - **`or`** — at least one operand must be `True` to produce `True`

    - **`not`** — negates the result; `not True` is `False`


    ```python

    age = 25; weight = 90


    age > 10 and weight > 80    # True AND True  → True

    age > 10 and weight > 100   # True AND False → False

    age > 10 or weight > 100    # True OR False  → True

    not age > 10                # not True       → False

    ```

    '
  reference: python-programming-interactive.ipynb
- topic: Python
  title: Comparison operators in Python
  prompt: What comparison operators can be used with any Python data type to produce
    a Boolean result?
  answer: '| Operator | Description |

    |---|---|

    | `==` | Equal |

    | `!=` | Not equal |

    | `>` | Greater than |

    | `>=` | Greater than or equal to |

    | `<` | Less than |

    | `<=` | Less than or equal to |


    ```python

    26 == 26.0    # True  — int equals equivalent float

    ''42'' == 42    # False — str never equals int/float

    ''python'' == ''Python''  # False — string comparison is case-sensitive

    ```

    '
  reference: python-programming-interactive.ipynb
- topic: Python
  title: Truthy and falsy values in Python
  prompt: What categories of values evaluate to `False` when passed to `bool()`?
  answer: 'Python considers three categories of values **falsy** (evaluate to `False`):


    1. Numeric values equal to **zero** — `bool(0)` → `False`; `bool(1)` → `True`

    2. **Empty** sequences and data structures — `bool('''')` → `False`; `bool(''python'')`
    → `True`

    3. `None` and `False` itself


    ```python

    bool(0)       # False

    bool(1)       # True

    bool('''')      # False

    bool(''hi'')    # True

    ```


    Everything else is considered **truthy**.

    '
  reference: python-programming-interactive.ipynb
- topic: Git
  title: '`elif` for multiple conditional branches'
  prompt: How does an `elif` chain work, and what is the rule for which branch executes?
  answer: "Python evaluates each condition in turn and executes the **first** block\
    \ that is `True`. All subsequent branches are skipped, even if they would also\
    \ be `True`.\n\n```python\nage = 77\n\nif age < 0 or age > 150:\n    print('Invalid\
    \ age entered')\nelif age >= 65:\n    category = 'Pensioner'\nelif age >= 18:\n\
    \    category = 'Adult'\nelse:\n    category = 'Child'\n```\n\n- `elif` and `else`\
    \ are **optional** and can appear any number of times.\n- Any code outside the\
    \ conditional block runs as normal regardless of which branch executed.\n"
  reference: python-programming-interactive.ipynb
- topic: Python
  title: Basic `for` loop pattern in Python
  prompt: What is the general pattern of a `for` loop, and what does the loop variable
    represent?
  answer: "A `for` loop executes code **for each element** in a sequence:\n\n```python\n\
    names = ['Dave', 'Sara', 'Mo']\n\nfor name in names:\n    print(name)\n```\n\n\
    - The variable between `for` and `in` (here `name`) represents the **current element**\
    \ on each iteration.\n- Any valid Python identifier can be used as the loop variable\
    \ name.\n- Each pass through the loop body is one **iteration**.\n"
  reference: python-programming-interactive.ipynb
- topic: Pandas
  title: Iterating over a list of tuples in a `for` loop
  prompt: How do you access individual fields from each tuple when looping over a
    list of tuples?
  answer: "Access tuple elements by **index position** inside the loop body:\n\n```python\n\
    profiles = [('John', 46), ('Paul', 21), ('Jasmine', 26)]\nages = []\n\nfor entry\
    \ in profiles:\n    ages.append(entry[1])   # entry[1] is the age (second element)\n\
    \nprint(f'Average age is {sum(ages) / len(ages)}')\n```\n\nThis pattern applies\
    \ to any list of fixed-length tuples (e.g. from `zip()`).\n"
  reference: python-programming-interactive.ipynb
- topic: Pandas
  title: Nesting a conditional inside a `for` loop
  prompt: How do you selectively modify a variable inside a `for` loop using a conditional?
  answer: "Declare variables before the loop, then update them conditionally inside:\n\
    \n```python\nbill = 0\nfreebies = 0\nprices = [4.75, 14, 0, 18.50, 0]\n\nfor item_price\
    \ in prices:\n    if item_price == 0:\n        freebies += 1\n    bill += item_price\n\
    \nprint(f'Total is £{bill}, including {freebies} free items!')\n```\n\n- Variables\
    \ modified inside the loop remain accessible **after** it finishes.\n- Conditional\
    \ blocks inside loops use the same indentation rules.\n"
  reference: python-programming-interactive.ipynb
- topic: Pandas
  title: '`while` loop — conditional repetition'
  prompt: What is the general pattern of a `while` loop, and how does it differ from
    a `for` loop?
  answer: "A `while` loop repeats its body **as long as a condition remains `True`**:\n\
    \n```python\nweight = 80\ntarget = 72\nmonthly_change = -3\nmonth = 0\n\nwhile\
    \ weight > target:\n    month += 1\n    weight += monthly_change\n    print(f'Month\
    \ {month}: {weight}')\n\nprint(f'It will take {month} months to reach {target}kg.')\n\
    ```\n\n- A `for` loop iterates over a **known sequence**; a `while` loop iterates\
    \ until a **condition fails**.\n- `while` loops are common in **continuous processes**\
    \ (e.g. shutting off a machine on alert).\n- Always ensure the condition will\
    \ eventually become `False` — a loop that never stops is an **infinite loop**.\n"
  reference: python-programming-interactive.ipynb
- topic: Pandas
  title: Pairing two parallel lists with `zip()`
  prompt: How do you combine two parallel lists into a list of tuples using `zip()`?
  answer: 'Pass both lists to `zip()`, then wrap in `list()` to materialise the result:


    ```python

    names = [''John'', ''Mandy'', ''Siri'']

    ages  = [17, 22, 14]


    details = list(zip(names, ages))

    # [(''John'', 17), (''Mandy'', 22), (''Siri'', 14)]

    ```


    Each tuple pairs one element from each list at the same position. The result has
    as many tuples as the **shorter** of the two lists.

    '
  reference: conditionals-loops-workbook.ipynb
- topic: Pandas
  title: Using `f-strings` to embed calculated values in strings
  prompt: How do you compute a value inside an f-string and embed it in the output
    message?
  answer: "Place any Python expression inside the curly braces `{}` of an f-string:\n\
    \n```python\nmy_age = 10\nmin_age = 18\n\nif my_age < min_age:\n    diff = min_age\
    \ - my_age\n    print(f'You are not allowed in.\\nCome back in {diff} years.')\n\
    ```\n\nYou can also compute inline without a variable:\n```python\nprint(f'Come\
    \ back in {min_age - my_age} years.')\n```\n\nUse `\\n` inside the string to insert\
    \ a newline character.\n"
  reference: conditionals-loops-workbook.ipynb
- topic: Pandas
  title: Building a filtered list inside a `for` loop with `.append()`
  prompt: How do you separate items from a list into two lists using a `for` loop
    and `.append()`?
  answer: "Initialise both lists before the loop, then append inside the conditional:\n\
    \n```python\nrefused = []\ninside  = []\nmin_age = 18\n\nfor person in details:\
    \          # details is a list of (name, age) tuples\n    if person[1] < min_age:\n\
    \        refused.append(person[0])\n    else:\n        inside.append(person[0])\n\
    \nprint(inside)\nprint(refused)\n```\n\nDeclare the lists **outside** the loop\
    \ so they persist and accumulate across all iterations.\n"
  reference: conditionals-loops-workbook.ipynb
- topic: Pandas
  title: Computing a percentage with `len()` and `round()`
  prompt: How do you calculate the percentage of items in one list relative to another
    and round to one decimal place?
  answer: 'Use `len()` to get list counts, divide, multiply by 100, then wrap in `round()`:


    ```python

    inside_prop = len(inside) / len(details) * 100

    print(f''{round(inside_prop, 1)}% of people are inside'')

    ```


    - `len(list)` returns the number of elements.

    - `round(value, ndigits)` rounds to the given number of decimal places.

    '
