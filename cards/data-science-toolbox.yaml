- topic: Pandas
  title: Accessing the last value in a column with `.iloc[-1]`
  prompt: How do you retrieve the value in the very last row of a column?
  answer: 'Use negative integer indexing with `.iloc`:


    ```python

    last_close = df[''Adj Close''].iloc[-1]

    ```


    Negative indices count from the end, so `-1` is the last row, `-2` the second-to-last,
    and so on.

    '
