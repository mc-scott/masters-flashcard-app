- topic: Pandas
  title: Extracting date parts from a datetime column with the `.dt` accessor
  prompt: How do you extract the year, month, day, and weekday name from a datetime
    column?
  answer: 'After converting a column with `pd.to_datetime()`, use the `.dt` accessor:


    ```python

    df[''Year'']    = df[''Date''].dt.year

    df[''Month'']   = df[''Date''].dt.month

    df[''Day'']     = df[''Date''].dt.day

    df[''Weekday''] = df[''Date''].dt.day_name()

    ```

    '
  reference: notebooks/assignments/stock.ipynb
- topic: Pandas
  title: Computing row-over-row percentage change with `.pct_change()`
  prompt: How do you calculate the percentage change between each row and the previous
    row for a column?
  answer: 'Use `.pct_change()` and multiply by 100 to express as a percentage:


    ```python

    df[''Change %''] = df[''Adj Close''].pct_change() * 100

